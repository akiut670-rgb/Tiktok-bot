<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTokSave Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #0a0e27;
            --surface: rgba(255,255,255,0.06);
            --surface-hover: rgba(255,255,255,0.1);
            --border: rgba(255,255,255,0.12);
            --accent: #00d4ff;
            --accent2: #ff006e;
            --neon-cyan: #00d4ff;
            --neon-pink: #ff006e;
            --neon-purple: #b537f2;
            --green: #00d26a;
            --text: #ffffff;
            --muted: rgba(255,255,255,0.5);
            --glass: rgba(255,255,255,0.09);
            --glass-border: rgba(255,255,255,0.18);
        }

        body.light-theme {
            --bg: #f8f6ff;
            --surface: rgba(0,0,0,0.04);
            --surface-hover: rgba(0,0,0,0.08);
            --border: rgba(0,0,0,0.1);
            --accent: #00d4ff;
            --accent2: #ff006e;
            --neon-cyan: #0099cc;
            --neon-pink: #cc0052;
            --neon-purple: #9933ff;
            --green: #00d26a;
            --text: #050a18;
            --muted: rgba(0,0,0,0.6);
            --glass: rgba(0,0,0,0.05);
            --glass-border: rgba(0,0,0,0.12);
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a0f3e 50%, #0a0e27 100%);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            padding-top: env(safe-area-inset-top);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0,212,255,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255,0,110,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body.light-theme {
            background: linear-gradient(135deg, #f8f6ff 0%, #ffe6f7 50%, #f8f6ff 100%);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(20,20,35,0.95);
            border: 1.5px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            backdrop-filter: blur(30px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 30px rgba(0,212,255,0.4), inset 0 0 20px rgba(0,212,255,0.1);
            max-width: 90%;
        }

        body.light-theme .toast { background: rgba(240,240,245,0.95); border-color: var(--neon-pink); }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast-icon { font-size: 20px; flex-shrink: 0; }
        .toast-text { font-size: 13px; color: rgba(255,255,255,0.95); font-weight: 500; }
        body.light-theme .toast-text { color: rgba(0,0,0,0.95); }

        .counter-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--glass);
            border: 1.5px solid var(--neon-cyan);
            border-radius: 24px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--neon-cyan);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(30px);
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,212,255,0.3), inset 0 0 15px rgba(0,212,255,0.08);
        }
        .counter-badge .counter-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; }

        .theme-toggle-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 48px;
            height: 48px;
            background: var(--glass);
            border: 1.5px solid var(--neon-pink);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.3s ease;
            z-index: 200;
            backdrop-filter: blur(30px);
            box-shadow: 0 0 20px rgba(255,0,110,0.3), inset 0 0 15px rgba(255,0,110,0.08);
        }

        .page { display: none; flex-direction: column; min-height: 100vh; padding-bottom: 80px; position: relative; z-index: 1; }
        .page.active { display: flex; }

        #homePage { align-items: center; padding: 60px 20px 100px; justify-content: center; }

        .logo { display: flex; align-items: center; gap: 16px; margin-bottom: 50px; animation: fadeDown 0.6s ease both; }
        .logo-icon {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(255,0,110,0.25));
            border: 2px solid var(--neon-cyan);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,212,255,0.4), 0 0 80px rgba(0,212,255,0.2), inset 0 0 30px rgba(0,212,255,0.15);
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
        }
        .logo-icon:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 50px rgba(0,212,255,0.5), 0 0 100px rgba(0,212,255,0.25), inset 0 0 30px rgba(0,212,255,0.2);
        }
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
        body.light-theme .logo-icon { background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(255,0,110,0.15)); border-color: var(--neon-pink); }
        
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; line-height: 1.1; background: linear-gradient(90deg, var(--neon-cyan) 0%, var(--neon-purple) 50%, var(--neon-pink) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }

        .stats-row { display: flex; gap: 20px; margin-bottom: 40px; animation: fadeUp 0.5s ease 0.1s both; justify-content: center; flex-wrap: wrap; }
        .stat-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--neon-cyan); font-weight: 500; background: var(--glass); padding: 8px 16px; border-radius: 12px; border: 1px solid var(--border); backdrop-filter: blur(20px); box-shadow: 0 0 15px rgba(0,212,255,0.15); }
        .stat-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--neon-cyan); animation: pulse 2s ease infinite; box-shadow: 0 0 12px var(--neon-cyan); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .card {
            width: 100%; max-width: 420px;
            background: var(--glass);
            border: 2px solid var(--neon-cyan);
            border-radius: 28px;
            padding: 32px 26px;
            backdrop-filter: blur(40px);
            animation: fadeUp 0.5s ease 0.15s both;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(0,212,255,0.25), 0 0 80px rgba(0,212,255,0.1), inset 0 0 30px rgba(0,212,255,0.08);
        }
        .card:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 0 50px rgba(255,0,110,0.3), 0 0 100px rgba(255,0,110,0.15), inset 0 0 30px rgba(255,0,110,0.1);
            transform: translateY(-4px);
        }
        
        .card-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .card-sub { font-size: 14px; color: var(--muted); margin-bottom: 26px; font-weight: 500; }

        .input-wrap { position: relative; margin-bottom: 16px; }
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 20px; opacity: 0.5; pointer-events: none; }
        
        input[type="text"] {
            width: 100%; padding: 16px 75px 16px 52px;
            background: rgba(0,212,255,0.1);
            border: 2px solid var(--neon-cyan);
            border-radius: 16px; color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px; outline: none; transition: all 0.3s;
            -webkit-user-select: text; user-select: text; touch-action: manipulation;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 20px rgba(0,212,255,0.15), inset 0 0 15px rgba(0,212,255,0.05);
        }
        body.light-theme input[type="text"] { background: rgba(0,212,255,0.08); color: #050a18; border-color: var(--neon-pink); }
        input::placeholder { color: var(--muted); }
        input:focus { 
            border-color: var(--neon-pink); 
            background: rgba(255,0,110,0.1); 
            box-shadow: 0 0 30px rgba(255,0,110,0.25), inset 0 0 15px rgba(255,0,110,0.08);
        }
        
        .paste-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: rgba(0,212,255,0.2); border: 1.5px solid var(--neon-cyan); color: var(--neon-cyan);
            border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; backdrop-filter: blur(15px);
            box-shadow: 0 0 15px rgba(0,212,255,0.25);
        }
        .paste-btn:hover {
            background: rgba(0,212,255,0.35);
            box-shadow: 0 0 25px rgba(0,212,255,0.4);
            transform: translateY(-50%) scale(1.05);
        }
        .paste-btn:active { transform: translateY(-50%) scale(0.95); }

        .btn-primary {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            color: white; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 0 40px rgba(0,212,255,0.5), 0 0 80px rgba(0,212,255,0.2);
            position: relative; overflow: hidden; letter-spacing: 0.5px;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .btn-primary:hover::before { left: 100%; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary:hover { box-shadow: 0 0 50px rgba(255,0,110,0.6), 0 0 100px rgba(255,0,110,0.3); }

        .footer-note { text-align: center; font-size: 12px; color: var(--muted); margin-top: 28px; line-height: 1.6; font-weight: 500; }

        #resultPage { padding: 0 0 80px; }
        .result-topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; }
        .back-btn { background: none; border: none; color: var(--neon-cyan); font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 6px; opacity: 0.8; transition: all 0.3s ease; font-weight: 600; }
        .back-btn:hover { opacity: 1; color: var(--neon-pink); }

        .media-wrapper { padding: 14px 20px 18px 20px; }
        .media-container {
            position: relative; width: 100%; aspect-ratio: 1/1;
            background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(255,0,110,0.12));
            border: 2px solid var(--neon-cyan);
            border-radius: 24px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            margin-bottom: 14px; cursor: pointer;
            box-shadow: 0 0 40px rgba(0,212,255,0.25), inset 0 0 30px rgba(0,212,255,0.08);
        }
        .media-thumbnail { width: 100%; height: 100%; object-fit: cover; }
        .play-button-overlay {
            position: absolute; width: 70px; height: 70px; background: rgba(0,212,255,0.25);
            border: 2.5px solid var(--neon-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; backdrop-filter: blur(15px); z-index: 10;
            box-shadow: 0 0 30px rgba(0,212,255,0.4);
        }
        .video-player-container { position: absolute; inset: 0; display: none; background: #000; z-index: 20; }
        .video-player-container.playing { display: flex; }
        .video-player-container video { width: 100%; height: 100%; object-fit: contain; }

        .carousel-wrapper { display: none; }
        .carousel-wrapper.active { display: block; }
        .carousel-main-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1/1; 
            background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(255,0,110,0.12));
            border: 2px solid var(--neon-cyan);
            border-radius: 24px; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 14px;
            box-shadow: 0 0 40px rgba(0,212,255,0.25), inset 0 0 30px rgba(0,212,255,0.08);
        }
        .carousel-image { width: 100%; height: 100%; object-fit: cover; display: none; }
        .carousel-image.active { display: block; }
        
        .thumbnail-overlay {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 90px;
            height: 90px;
            background: var(--glass);
            border: 2px solid var(--neon-cyan);
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(30px);
            box-shadow: 0 0 30px rgba(0,212,255,0.4), inset 0 0 20px rgba(0,212,255,0.1);
            z-index: 15;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .thumbnail-overlay:hover {
            background: rgba(0,212,255,0.2);
            border-color: var(--neon-pink);
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(255,0,110,0.4), inset 0 0 20px rgba(255,0,110,0.12);
        }
        .thumbnail-overlay img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .thumbnail-strip { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 14px; }
        .thumbnail-item { 
            width: 70px; 
            height: 70px; 
            border-radius: 10px; 
            overflow: hidden; 
            flex-shrink: 0; 
            border: 2px solid var(--neon-cyan); 
            opacity: 0.6; 
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0,212,255,0.15);
        }
        .thumbnail-item:hover { opacity: 0.8; }
        .thumbnail-item.active { 
            border-color: var(--neon-pink); 
            opacity: 1;
            box-shadow: 0 0 25px rgba(255,0,110,0.4);
        }
        .thumbnail-item img { width: 100%; height: 100%; object-fit: cover; }

        .info-section { padding: 18px 20px; }
        .info-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            gap: 14px; 
            margin-bottom: 12px; 
            padding: 14px 16px; 
            background: var(--glass);
            border-radius: 14px; 
            border: 1.5px solid var(--neon-cyan);
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,212,255,0.15), inset 0 0 15px rgba(0,212,255,0.05);
        }
        .info-item:hover {
            background: rgba(0,212,255,0.15);
            border-color: var(--neon-pink);
            box-shadow: 0 0 30px rgba(255,0,110,0.25), inset 0 0 15px rgba(255,0,110,0.08);
        }
        .info-label { font-size: 12px; color: var(--neon-cyan); font-weight: 700; }
        .info-value { font-size: 13px; color: var(--text); text-align: right; word-break: break-word; flex: 1; font-weight: 500; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 18px 20px; }
        .btn-secondary { 
            padding: 16px 18px; 
            border-radius: 14px; 
            border: 2px solid var(--neon-cyan); 
            background: var(--glass); 
            color: var(--neon-cyan); 
            font-size: 13px; 
            font-weight: 700; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,212,255,0.15), inset 0 0 15px rgba(0,212,255,0.05);
        }
        .btn-secondary:hover {
            background: rgba(0,212,255,0.2);
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 30px rgba(255,0,110,0.3), inset 0 0 15px rgba(255,0,110,0.1);
            transform: translateY(-2px);
        }
        .btn-secondary:active {
            transform: scale(0.95);
        }

        .downloads-header { 
            padding: 18px 20px; 
            border-bottom: 2px solid var(--neon-cyan);
            background: var(--glass);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 20px rgba(0,212,255,0.15);
        }
        .downloads-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        
        .dl-item { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            padding: 14px 20px; 
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .dl-item:hover {
            background: rgba(0,212,255,0.08);
        }
        .dl-thumb { 
            width: 54px; 
            height: 54px; 
            border-radius: 10px; 
            overflow: hidden; 
            flex-shrink: 0; 
            background: var(--glass);
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 1.5px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0,212,255,0.15);
        }
        .dl-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .dl-info { flex: 1; min-width: 0; }
        .dl-desc { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .dl-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .dl-item-download { 
            width: 40px; 
            height: 40px; 
            border-radius: 10px; 
            border: 1.5px solid var(--neon-cyan); 
            background: var(--glass); 
            color: var(--neon-cyan); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 15px rgba(0,212,255,0.15);
            font-size: 18px;
        }
        .dl-item-download:hover {
            background: rgba(0,212,255,0.2);
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 25px rgba(255,0,110,0.3);
            transform: scale(1.1);
        }

        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            display: flex; 
            padding: 10px 0; 
            background: var(--glass);
            border-top: 2px solid var(--neon-cyan); 
            z-index: 100; 
            padding-bottom: env(safe-area-inset-bottom);
            backdrop-filter: blur(30px);
            box-shadow: 0 0 30px rgba(0,212,255,0.2), inset 0 0 20px rgba(0,212,255,0.05);
        }
        .nav-btn { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            background: none; 
            border: none; 
            color: var(--muted); 
            font-size: 11px; 
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .nav-btn:hover { color: var(--neon-cyan); }
        .nav-btn.active { color: var(--neon-pink); text-shadow: 0 0 15px rgba(255,0,110,0.4); }
        .nav-icon { font-size: 26px; }

        @keyframes fadeDown { from { opacity: 0; transform: translateY(-25px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        .dots { display: inline-flex; gap: 5px; }
        .dots span { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: bounce 1.4s infinite; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon">✅</div>
        <div class="toast-text" id="toastText">Message</div>
    </div>

    <div class="counter-badge" id="counterBadge" style="display: none;">
        <span>📊</span><span class="counter-num" id="counterNum">0</span>
    </div>

    <button class="theme-toggle-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>

    <div class="page active" id="homePage">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 0 20px;">
            <div class="logo">
                <div class="logo-icon"><img src="logo.png" alt="TikTok Logo" /></div>
                <div class="logo-text">Tik<span style="color: var(--neon-pink);">Tok</span>Save</div>
            </div>
            <div class="stats-row">
                <div class="stat-item"><div class="stat-dot"></div><span>Online</span></div>
                <div class="stat-item"><span>⚡ HD Downloads</span></div>
            </div>
            <div class="card">
                <div class="card-title">Download TikTok Videos</div>
                <div class="card-sub">Paste a link to get started</div>
                <div class="input-wrap">
                    <div class="input-icon">🔗</div>
                    <input type="text" id="tiktokLink" placeholder="https://www.tiktok.com/..." />
                    <button class="paste-btn" onclick="pasteLink()">Paste</button>
                </div>
                <button class="btn-primary" id="downloadBtn" onclick="processLink()">Download Now ↓</button>
                <div class="footer-note">💡 Tip: Your downloads will be saved to Gallery/Downloads folder.</div>
            </div>
        </div>
    </div>

    <div class="page" id="resultPage">
        <div class="result-topbar"><button class="back-btn" onclick="goHome()">← Back</button></div>
        <div class="media-wrapper">
            <div id="videoWrapper" style="display: none;">
                <div class="media-container" onclick="playVideo()">
                    <img class="media-thumbnail" id="videoThumbnail" src="" />
                    <div class="play-button-overlay">▶️</div>
                    <div class="video-player-container" id="videoPlayerContainer"><video id="videoPlayer" controls></video></div>
                </div>
            </div>
            <div class="carousel-wrapper" id="carouselWrapper">
                <div class="carousel-main-container" id="carouselImagesContainer">
                    <img class="carousel-image active" id="carouselImageMain" src="" />
                    <div class="thumbnail-overlay" id="thumbnailOverlay" style="display: none;">
                        <img id="overlayThumbnail" src="" />
                    </div>
                </div>
                <div class="thumbnail-strip" id="thumbnailStrip"></div>
            </div>
        </div>
        <div class="info-section">
            <div class="info-item"><div class="info-label">Creator</div><div class="info-value" id="rUser">@user</div></div>
            <div class="info-item"><div class="info-label">Description</div><div class="info-value" id="rDesc">Video description</div></div>
        </div>
        <div class="button-group">
            <button class="btn-secondary" id="videoBtn" onclick="handleDownload('video')" style="display: none;"><span>📹</span><span>Video HD</span></button>
            <button class="btn-secondary" id="photoBtn" onclick="handleDownload('photo')" style="display: none;"><span>🖼️</span><span id="photoCount">Photos</span></button>
            <button class="btn-secondary" onclick="handleDownload('music')"><span>🎵</span><span>Music</span></button>
            <button class="btn-secondary" onclick="shareApp()"><span>📤</span><span>Share</span></button>
        </div>
    </div>

    <div class="page" id="downloadsPage">
        <div class="downloads-header"><div class="downloads-title">Downloads</div></div>
        <div class="dl-content" id="dlContent"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" id="navHome" onclick="switchTab('home')"><div class="nav-icon">🏠</div><div>Home</div></button>
        <button class="nav-btn" id="navDl" onclick="switchTab('downloads')"><div class="nav-icon">📥</div><div>Downloads</div></button>
    </div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        var downloads = JSON.parse(localStorage.getItem('tiktok_history') || '[]');
        var currentData = { link: '', video: '', music: '', thumb: '', photos: [], desc: '', user: '' };
        var currentPhotoIdx = 0;

        function showToast(icon, text) {
            var t = document.getElementById('toast');
            document.getElementById('toastIcon').textContent = icon;
            document.getElementById('toastText').textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = document.body.classList.contains('light-theme') ? '☀️' : '🌙';
        }

        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'home') {
                document.getElementById('homePage').classList.add('active');
                document.getElementById('navHome').classList.add('active');
            } else {
                document.getElementById('downloadsPage').classList.add('active');
                document.getElementById('navDl').classList.add('active');
                renderDownloads();
            }
        }

        function pasteLink() {
            if (tg.readTextFromClipboard) {
                tg.readTextFromClipboard(text => {
                    if (text) { document.getElementById('tiktokLink').value = text; showToast('📋', 'Link pasted!'); }
                });
            }
        }

        function processLink() {
            var url = document.getElementById('tiktokLink').value.trim();
            if (!url) return showToast('⚠️', 'Paste link first!');
            
            var btn = document.getElementById('downloadBtn');
            btn.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
            btn.disabled = true;

            fetch('https://www.tikwm.com/api/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'url=' + encodeURIComponent(url) + '&hd=1'
            })
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = 'Download Now ↓';
                btn.disabled = false;
                if (data.code === 0) {
                    var d = data.data;
                    currentData = {
                        link: url,
                        video: d.hdplay || d.play,
                        music: d.music,
                        thumb: d.cover,
                        photos: d.images || [],
                        desc: d.title || 'TikTok Video',
                        user: d.author ? d.author.unique_id : 'user'
                    };

                    document.getElementById('rUser').textContent = '@' + currentData.user;
                    document.getElementById('rDesc').textContent = currentData.desc;
                    
                    if (currentData.photos.length > 0) {
                        document.getElementById('carouselWrapper').classList.add('active');
                        document.getElementById('videoWrapper').style.display = 'none';
                        document.getElementById('photoBtn').style.display = 'flex';
                        document.getElementById('videoBtn').style.display = 'none';
                        document.getElementById('photoCount').textContent = currentData.photos.length + ' Photos · HD';
                        initCarousel();
                    } else {
                        document.getElementById('carouselWrapper').classList.remove('active');
                        document.getElementById('videoWrapper').style.display = 'block';
                        document.getElementById('videoBtn').style.display = 'flex';
                        document.getElementById('photoBtn').style.display = 'none';
                        document.getElementById('videoThumbnail').src = currentData.thumb;
                        document.getElementById('videoPlayer').src = currentData.video;
                    }

                    switchTab('result');
                    document.getElementById('resultPage').classList.add('active');
                    showToast('✅', 'Ready!');
                } else {
                    showToast('❌', 'Error fetching data');
                }
            })
            .catch(() => { btn.innerHTML = 'Download Now ↓'; btn.disabled = false; showToast('❌', 'Network error'); });
        }

        function initCarousel() {
            var strip = document.getElementById('thumbnailStrip');
            strip.innerHTML = '';
            currentData.photos.forEach((p, i) => {
                var t = document.createElement('div');
                t.className = 'thumbnail-item' + (i === 0 ? ' active' : '');
                t.innerHTML = `<img src="${p}">`;
                t.onclick = () => {
                    currentPhotoIdx = i;
                    document.getElementById('carouselImageMain').src = p;
                    document.getElementById('overlayThumbnail').src = p;
                    document.querySelectorAll('.thumbnail-item').forEach(el => el.classList.remove('active'));
                    t.classList.add('active');
                };
                strip.appendChild(t);
            });
            document.getElementById('carouselImageMain').src = currentData.photos[0];
            document.getElementById('overlayThumbnail').src = currentData.photos[0];
            document.getElementById('thumbnailOverlay').style.display = 'flex';
        }

        function handleDownload(type) {
            var url = '';
            var filename = 'tiktok_' + Date.now();
            
            if (type === 'video') { url = currentData.video; filename += '.mp4'; }
            else if (type === 'music') { url = currentData.music; filename += '.mp3'; }
            else if (type === 'photo') { url = currentData.photos[currentPhotoIdx]; filename += '.jpg'; }

            if (!url) return;

            showToast('📥', 'Downloading...');
            
            if (tg.downloadFile) {
                tg.downloadFile({ url: url, file_name: filename });
            } else {
                tg.openLink(url);
            }
            
            saveToHistory();
        }

        function saveToHistory() {
            downloads.unshift({
                desc: currentData.desc,
                thumb: currentData.thumb || (currentData.photos.length > 0 ? currentData.photos[0] : ''),
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                link: currentData.link
            });
            downloads = downloads.slice(0, 50);
            localStorage.setItem('tiktok_history', JSON.stringify(downloads));
        }

        function renderDownloads() {
            var c = document.getElementById('dlContent');
            if (downloads.length === 0) { c.innerHTML = '<div style="padding:40px;text-align:center;opacity:0.5;">No downloads yet</div>'; return; }
            c.innerHTML = downloads.map((d, i) => `
                <div class="dl-item">
                    <div class="dl-thumb"><img src="${d.thumb}"></div>
                    <div class="dl-info">
                        <div class="dl-desc">${d.desc}</div>
                        <div class="dl-time">${d.time}</div>
                    </div>
                    <button class="dl-item-download" onclick="reDownload(${i})">📥</button>
                </div>
            `).join('');
        }

        function reDownload(i) {
            document.getElementById('tiktokLink').value = downloads[i].link;
            processLink();
        }

        function goHome() {
            document.getElementById('resultPage').classList.remove('active');
            switchTab('home');
            document.getElementById('videoPlayer').pause();
        }

        function shareApp() {
            tg.openTelegramLink('https://t.me/share/url?url=' + encodeURIComponent('https://t.me/tiktokviedodownloaderbot'));
        }

        function playVideo() {
            var p = document.getElementById('videoPlayerContainer');
            var v = document.getElementById('videoPlayer');
            p.classList.toggle('playing');
            if (p.classList.contains('playing')) v.play(); else v.pause();
        }

        if (localStorage.getItem('theme') === 'light') toggleTheme();
    </script>
</body>
</html>
