<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTokSave Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #050a18;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --accent: #1a73e8;
            --accent2: #25f4ee;
            --text: #ffffff;
            --muted: rgba(255,255,255,0.45);
            --glass: rgba(255,255,255,0.08);
            --glass-border: rgba(255,255,255,0.15);
        }

        body.light-theme {
            --bg: #f8f9fa;
            --surface: rgba(0,0,0,0.03);
            --border: rgba(0,0,0,0.08);
            --accent: #1a73e8;
            --accent2: #10b981;
            --text: #050a18;
            --muted: rgba(0,0,0,0.5);
            --glass: rgba(0,0,0,0.04);
            --glass-border: rgba(0,0,0,0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(20,20,35,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .page { display: none; flex-direction: column; min-height: 100vh; padding-bottom: 80px; }
        .page.active { display: flex; }

        #homePage { align-items: center; padding: 60px 20px; }
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; }
        .logo-text span { color: var(--accent); }

        .card {
            width: 100%; max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 30px 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .input-wrap { position: relative; margin-bottom: 16px; }
        input[type="text"] {
            width: 100%; padding: 16px 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            border-radius: 16px; color: var(--text);
            font-size: 14px; outline: none;
        }
        .btn-primary {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px;
            cursor: pointer; box-shadow: 0 8px 24px rgba(26,115,232,0.3);
        }

        #resultPage { padding: 0 0 100px; }
        .media-section { padding: 20px; position: relative; }
        
        .main-media-container {
            position: relative; width: 100%; aspect-ratio: 1/1;
            border-radius: 24px; overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .main-img { width: 100%; height: 100%; object-fit: cover; }
        
        .small-photo-overlay {
            position: absolute; bottom: 16px; right: 16px;
            width: 80px; height: 80px;
            border-radius: 12px; border: 2px solid white;
            overflow: hidden; z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: #222;
        }
        .small-photo-overlay img { width: 100%; height: 100%; object-fit: cover; }

        .thumbnail-strip { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px 20px; scrollbar-width: none; }
        .thumb-item {
            width: 60px; height: 60px; border-radius: 10px; flex-shrink: 0;
            overflow: hidden; border: 2px solid transparent; opacity: 0.6; transition: 0.2s;
        }
        .thumb-item.active { border-color: var(--accent); opacity: 1; transform: scale(1.05); }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        .video-info-card {
            margin: 0 20px 20px; padding: 18px;
            border-radius: 20px;
        }
        .user-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .user-name { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); }

        .dl-options { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .dl-btn {
            width: 100%; padding: 14px 18px; border-radius: 18px; border: none;
            display: flex; align-items: center; gap: 14px;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: var(--text); cursor: pointer; transition: 0.2s;
        }
        .dl-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.15); }
        .dl-icon-box {
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(26,115,232,0.15); display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .dl-text-box { text-align: left; }
        .dl-main-text { font-weight: 700; font-size: 15px; }
        .dl-sub-text { font-size: 12px; color: var(--muted); margin-top: 2px; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 74px; display: flex; align-items: center; justify-content: space-around;
            background: rgba(10,10,25,0.8); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border); z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 22px; }

        .theme-btn { position: fixed; top: 16px; left: 16px; width: 44px; height: 44px; border-radius: 12px; z-index: 200; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .dots { display: inline-flex; gap: 4px; }
        .dots span { width: 5px; height: 5px; border-radius: 50%; background: #fff; animation: bounce 1.4s infinite; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    </style>
</head>
<body>
    <button class="theme-btn glass-panel" id="themeBtn" onclick="toggleTheme()">🌙</button>
    <div class="toast" id="toast"><span id="toastIcon">✅</span> <span id="toastText">Message</span></div>

    <div class="page active" id="homePage">
        <div class="logo"><div class="logo-text">Tik<span>Tok</span>Save Pro</div></div>
        <div class="card">
            <h2 style="margin-bottom: 8px;">Download</h2>
            <p style="color: var(--muted); font-size: 13px; margin-bottom: 24px;">Paste TikTok link below</p>
            <div class="input-wrap"><input type="text" id="tiktokUrl" placeholder="https://www.tiktok.com/..." /></div>
            <button class="btn-primary" id="processBtn" onclick="processUrl()">Download Now</button>
        </div>
    </div>

    <div class="page" id="resultPage">
        <div style="padding: 16px 20px;"><button onclick="goHome()" style="background:none; border:none; color:var(--text); font-size:16px; cursor:pointer;">← Back</button></div>
        <div class="media-section">
            <div class="main-media-container">
                <img id="mainImg" class="main-img" src="" />
                <video id="mainVid" style="display:none; width:100%; height:100%; object-fit:contain;" controls></video>
                <div id="smallOverlay" class="small-photo-overlay"><img id="overlayImg" src="" /></div>
            </div>
        </div>
        <div id="thumbStrip" class="thumbnail-strip"></div>
        <div class="video-info-card glass-panel">
            <div class="user-row"><div class="user-avatar">👤</div><div class="user-name" id="userName">@user</div></div>
            <p id="videoDesc" style="font-size: 13px; line-height: 1.4; color: var(--muted);"></p>
        </div>
        <div class="dl-options">
            <button class="dl-btn" id="dlVideoBtn" onclick="download('video')" style="display:none;"><div class="dl-icon-box">📹</div><div class="dl-text-box"><div class="dl-main-text">Download Video</div><div class="dl-sub-text">HD · No Watermark</div></div></button>
            <button class="dl-btn" id="dlPhotoBtn" onclick="download('photo')" style="display:none;"><div class="dl-icon-box">🖼️</div><div class="dl-text-box"><div class="dl-main-text">Download All Photos</div><div class="dl-sub-text" id="photoInfo">Batch download</div></div></button>
            <button class="dl-btn" onclick="download('music')"><div class="dl-icon-box">🎵</div><div class="dl-text-box"><div class="dl-main-text">Download Music</div><div class="dl-sub-text">MP3 · Original Sound</div></div></button>
        </div>
    </div>

    <div class="bottom-nav"><div class="nav-item active" onclick="goHome()"><div class="nav-icon">🏠</div><div>Home</div></div><div class="nav-item" onclick="showToast('📥', 'History feature coming soon!')"><div class="nav-icon">📥</div><div>Downloads</div></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        let currentData = { video: '', music: '', photos: [], thumb: '' };

        function showToast(icon, text) {
            const t = document.getElementById('toast');
            document.getElementById('toastIcon').textContent = icon;
            document.getElementById('toastText').textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            document.getElementById('themeBtn').textContent = document.body.classList.contains('light-theme') ? '☀️' : '🌙';
        }

        function goHome() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('homePage').classList.add('active');
            document.getElementById('mainVid').pause();
        }

        function processUrl() {
            const url = document.getElementById('tiktokUrl').value.trim();
            if (!url) return showToast('⚠️', 'Paste link first!');
            const btn = document.getElementById('processBtn');
            btn.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
            btn.disabled = true;

            fetch('https://www.tikwm.com/api/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'url=' + encodeURIComponent(url) + '&hd=1'
            })
            .then(res => res.json())
            .then(res => {
                btn.innerHTML = 'Download Now'; btn.disabled = false;
                if (res.code === 0) {
                    const d = res.data;
                    currentData = { video: d.hdplay || d.play, music: d.music, photos: d.images || [], thumb: d.cover };
                    document.getElementById('userName').textContent = '@' + (d.author ? d.author.unique_id : 'user');
                    document.getElementById('videoDesc').textContent = d.title || '';

                    if (currentData.photos.length > 0) {
                        document.getElementById('mainImg').style.display = 'block';
                        document.getElementById('mainVid').style.display = 'none';
                        document.getElementById('smallOverlay').style.display = 'block';
                        document.getElementById('dlPhotoBtn').style.display = 'flex';
                        document.getElementById('dlVideoBtn').style.display = 'none';
                        document.getElementById('photoInfo').textContent = currentData.photos.length + ' photos · HD';
                        document.getElementById('mainImg').src = currentData.photos[0];
                        document.getElementById('overlayImg').src = currentData.photos[0];
                        const strip = document.getElementById('thumbStrip');
                        strip.innerHTML = '';
                        currentData.photos.forEach((p, i) => {
                            const item = document.createElement('div');
                            item.className = 'thumb-item' + (i === 0 ? ' active' : '');
                            item.innerHTML = `<img src="${p}">`;
                            item.onclick = () => {
                                document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('active'));
                                item.classList.add('active');
                                document.getElementById('mainImg').src = p;
                                document.getElementById('overlayImg').src = p;
                            };
                            strip.appendChild(item);
                        });
                    } else {
                        document.getElementById('mainImg').style.display = 'none';
                        document.getElementById('mainVid').style.display = 'block';
                        document.getElementById('smallOverlay').style.display = 'none';
                        document.getElementById('dlVideoBtn').style.display = 'flex';
                        document.getElementById('dlPhotoBtn').style.display = 'none';
                        document.getElementById('mainVid').src = currentData.video;
                        document.getElementById('thumbStrip').innerHTML = '';
                    }
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById('resultPage').classList.add('active');
                    showToast('✅', 'Ready!');
                } else { showToast('❌', 'Error fetching data'); }
            })
            .catch(() => { btn.innerHTML = 'Download Now'; btn.disabled = false; showToast('❌', 'Network error'); });
        }

        function download(type) {
            if (type === 'photo') {
                const total = currentData.photos.length;
                showToast('📥', 'Downloading ' + total + ' photos...');
                let i = 0;
                function next() {
                    if (i >= total) { showToast('✅', 'Done!'); return; }
                    const url = currentData.photos[i];
                    if (tg.openLink) tg.openLink(url); else window.open(url, '_blank');
                    i++; setTimeout(next, 800);
                }
                next();
            } else {
                const url = type === 'video' ? currentData.video : currentData.music;
                if (!url) return;
                showToast('📥', 'Downloading...');
                if (tg.openLink) tg.openLink(url); else window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>
