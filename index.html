<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTokSave Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #050a18;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
            --accent: #1a73e8;
            --accent2: #25f4ee;
            --text: #ffffff;
            --muted: rgba(255,255,255,0.45);
            --glass: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.2);
        }

        body.light-theme {
            --bg: #ffffff;
            --surface: rgba(0,0,0,0.04);
            --border: rgba(0,0,0,0.08);
            --accent: #1a73e8;
            --accent2: #25f4ee;
            --text: #050a18;
            --muted: rgba(0,0,0,0.55);
            --glass: rgba(0,0,0,0.05);
            --glass-border: rgba(0,0,0,0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(20,20,35,0.95);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            backdrop-filter: blur(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .page { display: none; flex-direction: column; min-height: 100vh; padding-bottom: 80px; }
        .page.active { display: flex; }

        #homePage { align-items: center; padding: 60px 20px; }
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; }
        .logo-text span { color: var(--accent); }

        .card {
            width: 100%; max-width: 400px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 24px;
            backdrop-filter: blur(30px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .input-wrap { position: relative; margin-bottom: 16px; }
        input[type="text"] {
            width: 100%; padding: 16px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--glass-border);
            border-radius: 14px; color: var(--text);
            font-size: 14px; outline: none;
        }
        .btn-primary {
            width: 100%; padding: 18px; border-radius: 24px; border: none;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px;
            cursor: pointer; box-shadow: 0 6px 24px rgba(26,115,232,0.35);
        }

        #resultPage { padding: 0 0 80px; }
        .result-topbar { padding: 16px 20px; }
        .media-wrapper { padding: 12px 20px; }
        
        /* The specific feature requested: Main photo with small overlay */
        .media-container {
            position: relative; width: 100%; aspect-ratio: 1/1;
            background: #111; border-radius: 20px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .media-thumbnail { width: 100%; height: 100%; object-fit: cover; }
        
        .small-overlay {
            position: absolute; top: 12px; right: 12px;
            width: 50px; height: 70px;
            border-radius: 8px; border: 2px solid rgba(255,255,255,0.4);
            overflow: hidden; z-index: 10;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }
        .small-overlay img { width: 100%; height: 100%; object-fit: cover; }

        .thumbnail-strip { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px; scrollbar-width: none; }
        .thumbnail-strip::-webkit-scrollbar { display: none; }
        .thumb-item {
            width: 60px; height: 60px; border-radius: 8px; overflow: hidden;
            flex-shrink: 0; border: 2px solid transparent; opacity: 0.6;
        }
        .thumb-item.active { border-color: var(--accent); opacity: 1; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        .video-info { padding: 16px 20px; background: var(--glass); border-radius: 16px; margin: 0 20px 12px; border: 1px solid var(--glass-border); }
        .username { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; color: var(--accent); background: rgba(26,115,232,0.15); padding: 4px 10px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
        .video-desc { font-size: 13px; color: var(--muted); line-height: 1.4; }

        .dl-buttons { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .dl-btn {
            width: 100%; padding: 14px 18px; border-radius: 18px; border: none;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: var(--text); display: flex; align-items: center; gap: 12px; cursor: pointer;
        }
        .dl-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .dl-label { font-weight: 700; font-size: 15px; }
        .dl-sub { font-size: 12px; color: var(--muted); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 74px; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-btn { background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }

        .theme-btn { position: fixed; top: 16px; left: 16px; width: 44px; height: 44px; border-radius: 12px; background: var(--glass); border: 1px solid var(--glass-border); z-index: 200; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .dots { display: inline-flex; gap: 4px; }
        .dots span { width: 5px; height: 5px; border-radius: 50%; background: #fff; animation: bounce 1.4s infinite; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    </style>
</head>
<body>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <div class="toast" id="toast"><span id="tIcon">✅</span> <span id="tText">Message</span></div>

    <div class="page active" id="homePage">
        <div class="logo"><div class="logo-text">Tik<span>Tok</span>Save Pro</div></div>
        <div class="card">
            <h2 style="margin-bottom: 8px;">Download</h2>
            <p style="color: var(--muted); font-size: 13px; margin-bottom: 24px;">Paste TikTok link below</p>
            <div class="input-wrap"><input type="text" id="tiktokUrl" placeholder="https://www.tiktok.com/..." /></div>
            <button class="btn-primary" id="processBtn" onclick="processUrl()">Download Now</button>
        </div>
    </div>

    <div class="page" id="resultPage">
        <div class="result-topbar"><button onclick="goHome()" style="background:none; border:none; color:var(--text); font-size:16px; cursor:pointer;">← Back</button></div>
        <div class="media-wrapper">
            <div class="media-container">
                <img id="mainImg" class="media-thumbnail" src="" />
                <video id="mainVid" style="display:none; width:100%; height:100%; object-fit:contain;" controls></video>
                <div id="smallOverlay" class="small-overlay"><img id="overlayImg" src="" /></div>
            </div>
        </div>
        <div id="thumbStrip" class="thumbnail-strip"></div>
        <div class="video-info">
            <div class="username" id="uName">@user</div>
            <div class="video-desc" id="vDesc">Description</div>
        </div>
        <div class="dl-buttons">
            <button class="dl-btn" id="vBtn" onclick="download('video')" style="display:none;"><div class="dl-icon">📹</div><div><div class="dl-label">Download Video</div><div class="dl-sub">HD · No Watermark</div></div></button>
            <button class="dl-btn" id="pBtn" onclick="download('photo')" style="display:none;"><div class="dl-icon">🖼️</div><div><div class="dl-label">Download All Photos</div><div class="dl-sub" id="pInfo">Batch download</div></div></button>
            <button class="dl-btn" onclick="download('music')"><div class="dl-icon">🎵</div><div><div class="dl-label">Download Music</div><div class="dl-sub">MP3 · Original Sound</div></div></button>
        </div>
    </div>

    <div class="bottom-nav"><div class="nav-item active" onclick="goHome()"><div class="nav-icon">🏠</div><div>Home</div></div><div class="nav-item" onclick="showToast('📥', 'History feature coming soon!')"><div class="nav-icon">📥</div><div>Downloads</div></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        let currentData = { video: '', music: '', photos: [], thumb: '' };

        function showToast(icon, text) {
            const t = document.getElementById('toast');
            document.getElementById('tIcon').textContent = icon;
            document.getElementById('tText').textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        function goHome() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('homePage').classList.add('active');
            document.getElementById('mainVid').pause();
        }

        function processUrl() {
            const url = document.getElementById('tiktokUrl').value.trim();
            if (!url) return showToast('⚠️', 'Paste link first!');
            const btn = document.getElementById('processBtn');
            btn.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
            btn.disabled = true;

            fetch('https://www.tikwm.com/api/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'url=' + encodeURIComponent(url) + '&hd=1'
            })
            .then(res => res.json())
            .then(res => {
                btn.innerHTML = 'Download Now'; btn.disabled = false;
                if (res.code === 0) {
                    const d = res.data;
                    currentData = { video: d.hdplay || d.play, music: d.music, photos: d.images || [], thumb: d.cover };
                    document.getElementById('uName').textContent = '@' + (d.author ? d.author.unique_id : 'user');
                    document.getElementById('vDesc').textContent = d.title || '';

                    if (currentData.photos.length > 0) {
                        document.getElementById('mainImg').style.display = 'block';
                        document.getElementById('mainVid').style.display = 'none';
                        document.getElementById('smallOverlay').style.display = 'block';
                        document.getElementById('pBtn').style.display = 'flex';
                        document.getElementById('vBtn').style.display = 'none';
                        document.getElementById('pInfo').textContent = currentData.photos.length + ' photos · HD';
                        document.getElementById('mainImg').src = currentData.photos[0];
                        document.getElementById('overlayImg').src = currentData.photos[0];
                        const strip = document.getElementById('thumbStrip');
                        strip.innerHTML = '';
                        currentData.photos.forEach((p, i) => {
                            const item = document.createElement('div');
                            item.className = 'thumb-item' + (i === 0 ? ' active' : '');
                            item.innerHTML = `<img src="${p}">`;
                            item.onclick = () => {
                                document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('active'));
                                item.classList.add('active');
                                document.getElementById('mainImg').src = p;
                                document.getElementById('overlayImg').src = p;
                            };
                            strip.appendChild(item);
                        });
                    } else {
                        document.getElementById('mainImg').style.display = 'none';
                        document.getElementById('mainVid').style.display = 'block';
                        document.getElementById('smallOverlay').style.display = 'none';
                        document.getElementById('vBtn').style.display = 'flex';
                        document.getElementById('pBtn').style.display = 'none';
                        document.getElementById('mainVid').src = currentData.video;
                        document.getElementById('thumbStrip').innerHTML = '';
                    }
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById('resultPage').classList.add('active');
                    showToast('✅', 'Ready!');
                } else { showToast('❌', 'Error fetching data'); }
            })
            .catch(() => { btn.innerHTML = 'Download Now'; btn.disabled = false; showToast('❌', 'Network error'); });
        }

        function download(type) {
            if (type === 'photo') {
                const total = currentData.photos.length;
                showToast('📥', 'Downloading ' + total + ' photos...');
                let i = 0;
                function next() {
                    if (i >= total) { showToast('✅', 'Done!'); return; }
                    const url = currentData.photos[i];
                    if (tg.openLink) tg.openLink(url); else window.open(url, '_blank');
                    i++; setTimeout(next, 800);
                }
                next();
            } else {
                const url = type === 'video' ? currentData.video : currentData.music;
                if (!url) return;
                showToast('📥', 'Downloading...');
                if (tg.openLink) tg.openLink(url); else window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>
